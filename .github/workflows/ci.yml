name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: NixOS/nix-installer-action@main

      - run: nix -vL --show-trace flake check

      - name: Build firmware
        run: nix -vL --show-trace build .#firmware --out-link firmware-result

      - name: Build settings reset firmware
        run: nix -vL --show-trace build .#settings_reset --out-link settings-reset-result

      - run: |
          mkdir artifacts
          cp firmware-result/*.uf2 artifacts/
          cp settings-reset-result/*.uf2 artifacts/

      - uses: actions/upload-artifact@v7
        with:
          name: zmk_firmware
          path: artifacts
